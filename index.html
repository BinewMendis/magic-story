<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magic Story</title>
<style>
  body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  /* ROTATION LOCK SCREEN */
  #rotateLock {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    color:white;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
  }

  #rotateLock .lockContent .phone {
    width:50px;
    height:100px;
    border:3px solid white;
    border-radius:10px;
    margin-bottom: 20px;
    animation: rotateAnim 1s infinite alternate;
  }

  @keyframes rotateAnim {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(90deg); }
  }

  /* APP CONTENT */
  #appContent {
    display: block;
    width:100%;
    height:100%;
  }

  #story {
    position: absolute;
    top: 10%;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 600px;
    text-align: center;
    z-index: 5;
  }

  #question {
    font-size: 1.5rem;
    margin-bottom: 20px;
  }

  #choices button {
    display: block;
    margin: 10px auto;
    padding: 10px 25px;
    font-size: 1rem;
    cursor: pointer;
    border-radius: 5px;
    border: none;
    background: #ff69b4;
    color: white;
    transition: transform 0.2s;
  }
  #choices button:hover { transform: scale(1.1); }

  canvas { 
    display: block; 
    position: fixed; 
    top:0; 
    left:0; 
    z-index:-1; 
  }
</style>
</head>
<body>

<!-- ROTATION LOCK SCREEN -->
<div id="rotateLock">
  <div class="lockContent">
    <div class="phone"></div>
    <p>Please rotate your phone<br>to landscape mode to start</p>
  </div>
</div>

<!-- MAIN APP CONTENT -->
<div id="appContent">

  <div id="story">
    <h1 id="question"></h1>
    <div id="choices"></div>
  </div>

  <canvas id="threeCanvas"></canvas>

</div>

<!-- THREE.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.min.js"></script>

<!-- Your scripts -->
<script src="space.js"></script>
<script src="particles.js"></script>
<script src="story.js"></script>

<script>
// STRICT ROTATION CHECK
function checkOrientation(){
  const lock = document.getElementById("rotateLock");
  const app = document.getElementById("appContent");

  if(window.innerHeight > window.innerWidth){
    // PORTRAIT → SHOW LOCK
    lock.style.display="flex";
    app.style.display="none";
  }else{
    // LANDSCAPE → SHOW APP
    lock.style.display="none";
    app.style.display="block";
  }
}

// check on load
checkOrientation();

// check on resize or orientation change
window.addEventListener("resize", checkOrientation);
window.addEventListener("orientationchange", checkOrientation);
</script>

</body>
</html>
